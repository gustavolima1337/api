services:
  - type: web
    name: pricetrack-api
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn pricetrack.asgi:application -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://painel.vercel.app"
      - key: DATABASE_URL
        fromDatabase:
          name: pricetrack-db
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.11.0"

databases:
  - name: pricetrack-db
    databaseName: pricetrack
    user: pricetrack
    plan: free
