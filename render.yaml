services:
  - type: web
    name: pricetrack-api
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn pricetrack.asgi:application -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT"
    disk:
      name: pricetrack-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://painel.vercel.app"
      - key: DB_DIR
        value: "/data"
      - key: PYTHON_VERSION
        value: "3.11.0"
