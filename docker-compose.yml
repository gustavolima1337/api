version: "3.8"

services:
  web:
    build: .
    container_name: django_ninja_app
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      - DEBUG=1

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: jaeger-pricetrack
    ports:
      - "16686:16686"   # UI
      - "4317:4317"     # OTLP gRPC
      - "4318:4318"     # OTLP HTTP

